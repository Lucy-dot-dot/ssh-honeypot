name: Build and Publish SSH Honeypot

on:
  push:
    branches: [ "main", "master" ]
  # Also run on PRs to verify the build passes before merging
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  # Converts your repo name to lowercase (e.g. lucy-dot-dot/ssh-honeypot)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up Docker BuildKit, which is required to process your
      # --mount=type=cache instructions in the Dockerfile
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Logs into the GitHub registry (only on pushes to main, not PRs)
      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatically generates the tags (latest, or branch name)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Builds the image and utilizes GitHub Actions caching natively
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Don't push if it's just a Pull Request
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # This caches your Rust target/ and registry/ mounts from the Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max