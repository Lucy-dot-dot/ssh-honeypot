services:
  postgres:
    image: postgres:16-alpine
    container_name: ssh-honeypot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ssh_honeypot
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: honeypot
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      # Standard way to expose the port on everything
      # - "5432:5432"
      # Very verbose way to expose the port on localhost
      - protocol: tcp
        mode: host
        host_ip: 127.0.0.1
        name: postgres-ipv4
        published: 5432
        target: 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U honeypot -d ssh_honeypot" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  ssh-honeypot:
    image: ghcr.io/lucy-dot-dot/ssh-honeypot:master
    environment:
      DISABLE_CLI_INTERFACE: true
      DATABASE_URL: postgresql://honeypot:honeypot@postgres:5432/ssh_honeypot
    volumes:
      - source: ./config.toml
        target: /config.toml
        type: bind
      - source: keys
        target: /keys
        type: volume
    ports:
      - "2222:2222"
      - "22:22"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  keys:

# Uncomment this block AND update /etc/docker/daemon.json on the host to enable
# IPv6 inside the container (see README for daemon.json content).
# Without this, the honeypot will log a harmless bind error for the [::] interfaces
# and continue running on IPv4 only.
# networks:
#   default:
#     enable_ipv6: true
#     ipam:
#       config:
#         - subnet: 172.21.0.0/16
#         - subnet: fd00:2::/64
